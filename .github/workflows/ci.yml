name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache MoonBit toolchain
        id: cache-moonbit
        uses: actions/cache@v4
        with:
          path: ~/.moon
          key: moonbit-${{ runner.os }}-${{ hashFiles('moon.mod.json') }}
          restore-keys: moonbit-${{ runner.os }}-

      - name: Install MoonBit toolchain
        if: steps.cache-moonbit.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash || {
            echo "Official installer failed, falling back to manual install..."
            mkdir -p ~/.moon/bin ~/.moon/lib
            curl -fsSL -o /tmp/moonbit-wasm.tar.gz \
              https://github.com/moonbitlang/moonbit-compiler/releases/latest/download/moonbit-wasm.tar.gz
            tar -zxf /tmp/moonbit-wasm.tar.gz -C ~/.moon/bin
            tar -zxf ~/.moon/bin/core.tar.gz -C ~/.moon/lib

            # Create wrapper scripts for WASM-based tools
            for tool in moonc moonfmt mooninfo; do
              echo '#!/bin/bash' > ~/.moon/bin/$tool
              echo "exec node ~/.moon/bin/${tool}.js \"\$@\"" >> ~/.moon/bin/$tool
              chmod +x ~/.moon/bin/$tool
            done

            # Build moon build system from source
            git clone --depth 1 https://github.com/moonbitlang/moon /tmp/moon-build
            MOON_VERSION=$(cat ~/.moon/bin/moon_version)
            cd /tmp/moon-build
            git fetch origin "$MOON_VERSION" --depth 1 && git checkout "$MOON_VERSION" || true
            cargo build --release
            cp target/release/moon ~/.moon/bin/moon
            cp target/release/moonrun ~/.moon/bin/moonrun 2>/dev/null || true
            cd -

            # Bundle core library
            export PATH="$HOME/.moon/bin:$PATH"
            cd ~/.moon/lib/core && moon bundle --target js
          }

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check MoonBit version
        run: |
          moon version
          moonc -v

      - name: Format check
        run: moon fmt --check

      - name: Type check
        run: moon check --target js

      - name: Build (JS release)
        run: moon build --target js --release

      - name: Test MoonBit module
        run: |
          node --input-type=module -e "
            import { handle_request } from './_build/js/release/build/src/lib/lib.js';

            function assert(cond, msg) { if (!cond) { console.error('FAIL:', msg); process.exit(1); } }

            // Test GET /todos (empty)
            let r = JSON.parse(handle_request('GET', '/todos', ''));
            assert(r.status === 200, 'GET /todos status');
            assert(r.body === '[]', 'GET /todos empty');

            // Test POST /todos
            r = JSON.parse(handle_request('POST', '/todos', '{\"title\":\"Test todo\"}'));
            assert(r.status === 201, 'POST status');
            let todo = JSON.parse(r.body);
            assert(todo.id === 1, 'todo id');
            assert(todo.title === 'Test todo', 'todo title');
            assert(todo.completed === false, 'todo completed');

            // Test GET /todos (with item)
            r = JSON.parse(handle_request('GET', '/todos', ''));
            let todos = JSON.parse(r.body);
            assert(todos.length === 1, 'todos length');

            // Test toggle
            r = JSON.parse(handle_request('PUT', '/todos/1/toggle', ''));
            todo = JSON.parse(r.body);
            assert(todo.completed === true, 'toggle completed');

            // Test DELETE
            r = JSON.parse(handle_request('DELETE', '/todos/1', ''));
            assert(r.status === 200, 'delete status');

            // Verify empty after delete
            r = JSON.parse(handle_request('GET', '/todos', ''));
            todos = JSON.parse(r.body);
            assert(todos.length === 0, 'empty after delete');

            // Test 404
            r = JSON.parse(handle_request('GET', '/nonexistent', ''));
            assert(r.status === 404, '404 status');

            // Test POST without title
            r = JSON.parse(handle_request('POST', '/todos', '{}'));
            assert(r.status === 400, 'missing title');

            console.log('All tests passed!');
          "

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Build
        run: moon build --target js --release

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
